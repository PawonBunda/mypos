<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Kasir</title>

<style>
*{
  box-sizing:border-box;
  font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#4a90e2,#6fb1fc);
}

/* BOX LOGIN */
.box{
  background:white;
  width:390px;
  padding:35px 30px;
  border-radius:18px;
  box-shadow:0 25px 60px rgba(0,0,0,0.25);
  text-align:center;
  animation:fade .5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* LOGO */
.logo{
  width:140px;   /* 🔥 PERBESAR LOGO */
  margin-bottom:10px;
}

/* TITLE */
h2{
  margin:10px 0 25px;
  color:#333;
}

/* LABEL */
.label{
  text-align:left;
  font-size:13px;
  margin-top:10px;
  margin-bottom:5px;
  color:#555;
  font-weight:600;
}

/* INPUT */
input{
  width:100%;
  padding:13px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
  transition:.2s;
}

input:focus{
  outline:none;
  border:1px solid #4a90e2;
  box-shadow:0 0 0 3px rgba(74,144,226,.15);
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  transition:.2s;
}

.btn-login{
  background:#4a90e2;
  color:white;
}
.btn-login:hover{
  background:#357bd8;
}

.btn-admin{
  background:#2ecc71;
  color:white;
}
.btn-admin:hover{
  background:#27ae60;
}

.loading{
  display:none;
  margin-top:12px;
  color:#4a90e2;
  font-size:13px;
}

/* FOOTER */
.footer{
  margin-top:22px;
  font-size:12px;
  color:#888;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:14px;
  width:320px;
  box-shadow:0 10px 40px rgba(0,0,0,.3);
  text-align:center;
}

.modal-box h3{
  margin-bottom:15px;
}

/* INPUT MODAL */
.modal-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

/* BUTTON MODAL */
.modal-btn{
  display:flex;
  gap:10px;
}

.modal-btn button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:.25s;
}

/* MASUK (HIJAU) */
.modal-btn button:first-child{
  background:#2ecc71;
  color:white;
}
.modal-btn button:first-child:hover{
  background:#27ae60;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(46,204,113,0.4);
}

/* BATAL (MERAH) */
.batal{
  background:#e74c3c !important;
  color:white;
}
.batal:hover{
  background:#c0392b !important;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(231,76,60,0.4);
}

/* CUSTOM ALERT (TOAST) */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:#fff;
  padding:14px 18px;
  border-radius:12px;
  box-shadow:0 15px 40px rgba(0,0,0,.2);
  font-weight:600;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:9999;
  min-width:240px;
  text-align:center;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.toast.error{
  border-left:6px solid #e74c3c;
  color:#c0392b;
}

.toast.success{
  border-left:6px solid #2ecc71;
  color:#27ae60;
}

</style>
</head>

<body>

<div class="box">

  <!-- LOGO -->
  <img src="logo.png" class="logo">

  <h2>Login Kasir</h2>

  <div class="label">Nama Kasir</div>
  <input id="nama" placeholder="Contoh: Andi Saputra">

  <div class="label">Password</div>
  <input id="password" type="password" placeholder="Masukkan password">

  <button class="btn-login" onclick="login()">Masuk</button>
  <button class="btn-admin" onclick="openAdminModal()">🔧 Login Admin (Produk)</button>

  <div class="loading" id="loading">Memeriksa data kasir...</div>

  <div class="footer">Sistem Kasir</div>
</div>

<!-- MODAL ADMIN -->
<div id="adminModal" class="modal">
  <div class="modal-box">
    <h3>Login Admin</h3>
    <input type="password" id="adminPass" placeholder="Masukkan Password Admin">

    <div class="modal-btn">
      <button onclick="cekAdmin()">Masuk</button>
      <button class="batal" onclick="closeAdminModal()">Batal</button>
    </div>
  </div>
</div>

<!-- ALERT -->
<div id="toast" class="toast"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyDV2fXvon271SjTkhwHLdKJPNTl_YOMaLl3OuqEX4VrRVfRuElgLTUJIzInjCMCzGtag/exec";

/* AUTO BESAR HURUF AWAL */
document.getElementById("nama").addEventListener("input", function(){
  this.value = this.value.replace(/\b\w/g, c => c.toUpperCase());
});

/* ALERT CUSTOM */
function showToast(msg, type="error"){
  const toast = document.getElementById("toast");
  toast.className = "toast " + type;
  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },2500);
}

/* LOGIN */
function login(){
  const nama = document.getElementById("nama").value.trim();
  const password = document.getElementById("password").value.trim();
  const loading = document.getElementById("loading");

  if(!nama || !password){
    showToast("Nama dan password wajib diisi","error");
    return;
  }

  loading.style.display="block";

  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      action:"loginKasir",
      nama:nama,
      password:password
    })
  })
  .then(r=>r.text())
  .then(res=>{
    loading.style.display="none";

    if(res==="OK"){
      localStorage.setItem("kasirAktif",nama);
      window.location.href="kasir.html";
    }else{
      showToast("Nama / Password salah atau kasir tidak aktif","error");
    }
  });
}

/* ADMIN MODAL */
function openAdminModal(){
  document.getElementById("adminModal").style.display="flex";
}
function closeAdminModal(){
  document.getElementById("adminModal").style.display="none";
  document.getElementById("adminPass").value="";
}

/* LOGIN ADMIN */
function cekAdmin(){
  const pass=document.getElementById("adminPass").value.trim();

  if(pass==="admin123"){
    window.location.href="produk.html";
  }else{
    showToast("Password admin salah","error");
  }
}
</script>

</body>
</html>
